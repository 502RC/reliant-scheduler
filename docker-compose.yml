services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: reliant_scheduler
      POSTGRES_USER: reliant
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reliant -d reliant_scheduler"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: prod
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: reliant_scheduler
      POSTGRES_USER: reliant
      POSTGRES_PASSWORD: changeme
      ENTRA_CLIENT_ID: f645cb59-3146-489e-b263-312ae4581ec3
      ENTRA_TENANT_ID: a94daf96-fc17-4872-bc82-ca272460874d
      BACKEND_CORS_ORIGINS: "https://10.16.10.70:4443,http://localhost:5173"
      AZURE_KEYVAULT_URL: "https://ghskvrltdeveus201.vault.azure.net/"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: prod
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
